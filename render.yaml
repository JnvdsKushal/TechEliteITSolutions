services:

  # ── Django Backend ────────────────────────────────────────────────────────
  - type: web
    name: techelite-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: techelite-db
          property: connectionString
      - key: ULTRAMSG_INSTANCE
        sync: false
      - key: ULTRAMSG_TOKEN
        sync: false
      - key: ULTRAMSG_TO
        sync: false

  # ── React Frontend ────────────────────────────────────────────────────────
  - type: web
    name: techelite-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: techelite-db
    databaseName: techelite_db
    user: postgres
    plan: free